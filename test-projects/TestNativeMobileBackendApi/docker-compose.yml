services:
  postgres:
    image: postgres:16-alpine
    container_name: testnativemobile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_password
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatdb"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
